<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPR Match Journal</title>
    <!-- Google Fonts: Outfit for headers, Inter for text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <!-- Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header glass-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fa-solid fa-dice-d20"></i>
                </div>
                <div>
                    <h1>OPR Journal</h1>
                    <span class="subtitle">Your Casual Game Tracker</span>
                </div>
            </div>
            
            <div class="header-actions">
                <!-- Theme Toggle -->
                <button class="icon-btn theme-toggle" id="themeToggleBtn" aria-label="Toggle Dark/Light Mode" title="Toggle Theme">
                    <i class="fa-solid fa-moon dark-icon"></i>
                    <i class="fa-solid fa-sun light-icon"></i>
                </button>
                
                <div class="action-divider"></div>

                <!-- Export/Import Actions -->
                <button class="btn-secondary" id="exportBtn" title="Export matches to CSV">
                    <i class="fa-solid fa-file-export"></i> <span class="btn-text-hide">Export CSV</span>
                </button>
                <button class="btn-secondary" id="importBtn" title="Import matches from CSV">
                    <i class="fa-solid fa-file-import"></i> <span class="btn-text-hide">Import CSV</span>
                </button>
                <input type="file" id="csvFileInput" accept=".csv" style="display: none;">

                <!-- Add Match Button -->
                <button class="btn-primary" id="addMatchBtn">
                    <i class="fa-solid fa-plus"></i> <span>Log Match</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Summary -->
            <div class="stats-ribbon">
                <div class="stat-pill">
                    <i class="fa-solid fa-book-open text-primary"></i>
                    <span class="stat-label">Total Games</span>
                    <strong class="stat-value" id="totalGamesStat">0</strong>
                </div>
                <div class="stat-pill">
                    <i class="fa-solid fa-trophy" style="color: #fbbf24;"></i>
                    <span class="stat-label">Games Won</span>
                    <strong class="stat-value" id="gamesWonStat">0</strong>
                </div>
                <div class="stat-pill">
                    <i class="fa-solid fa-location-dot text-secondary"></i>
                    <span class="stat-label">Locations</span>
                    <strong class="stat-value" id="locationsStat">0</strong>
                </div>
                <div class="stat-pill">
                    <i class="fa-solid fa-user-group text-accent"></i>
                    <span class="stat-label">Opponents</span>
                    <strong class="stat-value" id="opponentsStat">0</strong>
                </div>
            </div>

            <!-- Journal Entries -->
            <section class="journal-feed" id="journalFeed">
                <!-- Entries populated by JS -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">
                        <i class="fa-solid fa-ghost"></i>
                    </div>
                    <h2>No matches recorded yet</h2>
                    <p>Start your journal by logging your first OnePageRules game!</p>
                    <button class="btn-primary mt-3" onclick="document.getElementById('addMatchBtn').click()">
                        Log First Match
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Match Modal (Hidden by default) -->
    <div class="modal-overlay" id="addMatchModal">
        <div class="modal-content glass-panel bounce-in">
            <div class="modal-header">
                <h2>Log a New Match</h2>
                <button class="icon-btn close-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="addMatchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="matchDate"><i class="fa-regular fa-calendar"></i> Date</label>
                        <input type="date" id="matchDate" required>
                    </div>
                    <div class="form-group">
                        <label for="matchLocation"><i class="fa-solid fa-store"></i> Location / Store</label>
                        <input type="text" id="matchLocation" list="locationsList" placeholder="e.g. Local Game Store" required>
                        <datalist id="locationsList"></datalist>
                    </div>
                </div>

                <div class="form-group">
                    <label for="opponentName"><i class="fa-solid fa-user-ninja"></i> Opponent Name</label>
                    <input type="text" id="opponentName" list="opponentsList" placeholder="Who did you play against?" required>
                    <datalist id="opponentsList"></datalist>
                </div>

                <div class="battlefield-divider">
                    <span>The Matchup</span>
                </div>

                <div class="form-row matchup-row">
                    <div class="form-group my-faction-group">
                        <label for="myFaction">My Faction</label>
                        <input type="text" id="myFaction" list="myFactionsList" placeholder="Your Army" required>
                        <datalist id="myFactionsList"></datalist>
                    </div>
                    
                    <div class="vs-badge">VS</div>
                    
                    <div class="form-group opp-faction-group">
                        <label for="oppFaction">Opponent's Faction</label>
                        <input type="text" id="oppFaction" list="oppFactionsList" placeholder="Their Army" required>
                        <datalist id="oppFactionsList"></datalist>
                    </div>
                </div>

                <div class="form-group mt-3">
                    <label for="matchWinner"><i class="fa-solid fa-crown"></i> Who Won?</label>
                    <select id="matchWinner" required>
                        <option value="" disabled selected>Select winner...</option>
                        <option value="me">Me</option>
                        <option value="opponent">Opponent</option>
                        <option value="draw">Draw</option>
                    </select>
                </div>

                <!-- Optional Notes -->
                <div class="form-group mt-3">
                    <label for="matchNotes"><i class="fa-regular fa-clipboard"></i> Notes / Highlights (Optional)</label>
                    <textarea id="matchNotes" rows="3" placeholder="Epic moments, funny rolls, or final thoughts..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="deleteMatchBtn" style="display: none; margin-right: auto; color: var(--brand-primary); border-color: var(--brand-primary);">
                        <i class="fa-solid fa-trash"></i> Delete
                    </button>
                    <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-check"></i> Save to Journal
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="notificationToast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMessage">Match saved successfully!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
